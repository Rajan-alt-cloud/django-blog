{% extends 'base.html' %}

{% block content %}
{% load crispy_forms_tags %}
<div class="row">
<!-- left sidebar -->
<!-- load the sidebar content -->
 {% include 'dashboard/sidebar.html' %}

<!-- right sidebar -->
	<div class="col-md-9">
        <h2>Add User</h2>
        <form action="{% url 'add_user' %}" method="POST" enctype="multipart/form-data" style="width: 500px;">
            {% csrf_token %}
            {% if form.errors %}
            <div class="alert alert-danger" role="alert">
                Please review the highlighted form errors and try again.
            </div>
            {% endif %}
            {{ form|crispy }}
            <button type="submit" class="btn btn-warning">Add User</button>
        </form>
        <br>
</div>

{% endblock %}
